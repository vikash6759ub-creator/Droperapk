# Codemagic Automation Workflow for Universal RTO Installer
workflows:
  android-universal-build:
    name: Rto Installer Universal Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      groups:
        - sdk_config # Agar aapne Codemagic dashboard par koi secret banaya hai
      vars:
        PACKAGE_NAME: "com.example.rtoechallan"
      node: latest
      java: 17 # Android 13/14 build ke liye Java 17 zaroori hai
      android_sdk: 34

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
      - name: Grant executable permissions to Gradle
        script: |
          chmod +x gradlew

      - name: Build Android Release APK
        script: |
          # Ye command aapka final APK generate karegi
          ./gradlew assembleRelease

    artifacts:
      # Build khatam hone ke baad APK yahan se milegi
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com # <--- Yahan apni Email ID zaroor badal lena
        notify:
          success: true
          failure: true
