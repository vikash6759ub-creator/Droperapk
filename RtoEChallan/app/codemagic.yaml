# Codemagic Automation for Droperapk
workflows:
  android-universal-workflow:
    name: Universal RTO Installer Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      java: 17
      android_sdk: 34

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
      - name: Build Android Release APK
        script: |
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - app/build/outputs/apk/release/*.apk

    publishing:
      scripts:
        - name: Done
          script: echo "Build Complete! Check Artifacts to download APK."
