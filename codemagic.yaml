workflows:
  android-dropper-build:
    name: Dropper APK Build (Super Auto)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Full Auto-Repair and Build
        script: |
          cd RtoEChallan
          
          # 1. Settings file ko fresh likho
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = 'RtoEChallan'
          include ':app'
          EOF

          # 2. Project-level build.gradle (Plugins setup)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. Wrapper and Permissions
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          
          # 4. Build with "Offline" mode off and Clean
          ./gradlew clean assembleDebug --stacktrace
          
    artifacts:
      - "**/build/outputs/apk/**/*.apk"
