workflows:
  android-dropper-build:
    name: RTO-Logo-Fix-Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 11
    scripts:
      - name: Auto-Find Logo and Build
        script: |
          cd RtoEChallan || cd .
          rm -rf .gradle gradle gradlew gradlew.bat settings.gradle build.gradle app
          mkdir -p app/src/main/res/drawable app/src/main/java/com/rto/echallan

          # 1. LOGO FINDER (Dhundhne ka logic)
          # Poore repo mein mainlogo.png ko dhundho
          LOGO_PATH=$(find $CM_BUILD_DIR -iname "mainlogo.png" | head -n 1)

          if [ -z "$LOGO_PATH" ]; then
            echo "Logo nahi mila, dummy logo bana raha hoon build bachane ke liye"
            # Ek khali file bana dega taaki error na aaye
            touch app/src/main/res/drawable/mainlogo.png 
          else
            echo "Logo mil gaya: $LOGO_PATH"
            cp "$LOGO_PATH" app/src/main/res/drawable/mainlogo.png
          fi

          # 2. AndroidX Fix (Jo 11847.jpg mein tha)
          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # 3. Fresh Config (Simple & Fast)
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:4.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 30
              defaultConfig {
                  applicationId "com.rto.echallan"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.2.0' }
          EOF

          # 4. Manifest & Java
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rto.echallan">
              <application android:label="Rto E Challan" android:icon="@drawable/mainlogo" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity>
              </application>
          </manifest>
          EOF
          echo "package com.rto.echallan; import android.app.Activity; import android.os.Bundle; public class MainActivity extends Activity { @Override protected void onCreate(Bundle s) { super.onCreate(s); } }" > app/src/main/java/com/rto/echallan/MainActivity.java

          # 5. Build Start
          gradle wrapper --gradle-version 6.7.1
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
