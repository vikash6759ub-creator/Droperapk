workflows:
  android-dropper-build:
    name: RTO Ultimate Success
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Final Force Build
        script: |
          # 1. Project Folder Hunter
          echo "Finding the real project folder..."
          # Hum settings.gradle dhoond rahe hain kyunki wahi asli project root hai
          SETTINGS_FILE=$(find . -name "settings.gradle" | head -n 1)
          
          if [ -n "$SETTINGS_FILE" ]; then
            PROJECT_ROOT=$(dirname "$SETTINGS_FILE")
            cd "$PROJECT_ROOT"
            echo "Moving to project root: $(pwd)"
          else
            echo "ERROR: settings.gradle nahi mila! Repo check karo."
            exit 1
          fi

          # 2. Permissions & Background Logic Fix (Fixes 11798.jpg)
          find . -name "AndroidManifest.xml" -exec sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" /> \
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" /> \
          <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />' {} +

          # 3. Create Gradle Wrapper if missing (Fixes 11804.jpg)
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.0.2
          fi
          chmod +x gradlew

          # 4. Final Assemble
          ./gradlew assembleDebug --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/**/*.apk"
