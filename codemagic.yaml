workflows:
  android-dropper-build:
    name: RTO-Bhai-Final-Fix
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 11
    scripts:
      - name: Ultimate Build No Dependencies
        script: |
          cd RtoEChallan || cd .
          rm -rf .gradle gradle gradlew gradlew.bat settings.gradle build.gradle app/build.gradle
          
          mkdir -p app/src/main/res/drawable app/src/main/java/com/rto/echallan

          # 1. Base Settings
          echo "include ':app'" > settings.gradle

          # 2. Basic Build Script (Version 4.2.2 is most stable for direct builds)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:4.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 3. App Script (Zero Conflicts)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 30
              buildToolsVersion "30.0.3"
              defaultConfig {
                  applicationId "com.rto.echallan"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
          }
          EOF

          # 4. Manifest (Only Core)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rto.echallan">
              <application android:label="Rto E Challan" android:icon="@drawable/mainlogo">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. Core Java
          echo "package com.rto.echallan; import android.app.Activity; import android.os.Bundle; public class MainActivity extends Activity { @Override protected void onCreate(Bundle s) { super.onCreate(s); } }" > app/src/main/java/com/rto/echallan/MainActivity.java

          # 6. Logo & Build
          find $CM_BUILD_DIR -iname "mainlogo.png" -exec cp {} app/src/main/res/drawable/mainlogo.png \;
          gradle wrapper --gradle-version 6.7.1
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
