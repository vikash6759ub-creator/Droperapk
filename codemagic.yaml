workflows:
  android-dropper-build:
    name: RTO-Bypass-Master
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Force Bypass and Build
        script: |
          # 1. Purani sari kachra files ko bypass/delete karna (Fixes 11830.jpg)
          rm -f settings.gradle build.gradle gradlew gradlew.bat
          rm -rf .gradle
          
          # 2. Sahi project folder mein ghusna
          cd RtoEChallan || cd .
          echo "Current working directory: $(pwd)"

          # 3. Logo Injection (drawable setup)
          mkdir -p app/src/main/res/drawable
          find $CM_BUILD_DIR -iname "mainlogo.png" -exec cp {} app/src/main/res/drawable/mainlogo.png \;

          # 4. AUTO-GENERATION (Bypassing manual file errors)
          # Agar settings.gradle mein lafda hai, toh use naya bana do
          echo "include ':app'" > settings.gradle
          
          # 5. FRESH GRADLE WRAPPER (Fixes Error 127)
          # Isse .jar aur gradlew files automatic fresh ban jayengi
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

          # 6. FINAL FORCE BUILD
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
