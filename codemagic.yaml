# Codemagic Automation - Sub-folder Fix
workflows:
  android-dropper-build:
    name: Dropper APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      java: 17

    scripts:
      - name: Build Android Release APK
        script: |
          # 1. Sabse pehle sub-folder ke andar jao
          cd RtoEChallan
          
          # 2. Check karo ki kya hum sahi jagah hain
          ls -la
          
          # 3. Gradlew ko permission do aur build shuru karo
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      # Artifact path bhi sub-folder ke hisab se
      - RtoEChallan/app/build/outputs/apk/release/*.apk

    publishing:
      scripts:
        - name: Done
          script: echo "Bhai, sub-folder wala masla hal ho gaya!"
