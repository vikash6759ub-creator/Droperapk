# Codemagic Automation for Droperapk (Fixed Path)
workflows:
  android-dropper-build:
    name: Dropper APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      java: 17

    scripts:
      - name: Build Android Release APK
        script: |
          # Sabse pehle gradlew file ko dhoondo aur us folder mein jao
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
          cd "$GRADLEW_DIR"
          
          echo "Building in directory: $GRADLEW_DIR"
          
          # Permissions set karo
          chmod +x gradlew
          
          # Build shuru karo
          ./gradlew assembleRelease

    artifacts:
      - "**/build/outputs/apk/release/*.apk"

    publishing:
      scripts:
        - name: Done
          script: echo "Build Finished!"
