workflows:
  android-dropper-build:
    name: Dropper APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Auto-Fix Project Structure and Build
        script: |
          cd RtoEChallan
          
          # 1. Project-level build.gradle khud likho (Missing Plugins fix)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 2. settings.gradle khud likho
          echo "include ':app'" > settings.gradle
          
          # 3. Wrapper generate karo
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          
          # 4. Build shuru
          ./gradlew assembleRelease
          
    artifacts:
      - "RtoEChallan/app/build/outputs/apk/release/*.apk"
