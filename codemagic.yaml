# Codemagic Automation - Auto-Fix & Build
workflows:
  android-dropper-build:
    name: Dropper APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Auto-Fix and Build
        script: |
          cd RtoEChallan
          
          # 1. Agar settings.gradle missing hai toh khud banao
          if [ ! -f "settings.gradle" ]; then
            echo "include ':app'" > settings.gradle
            echo "rootProject.name = 'RtoEChallan'" >> settings.gradle
          fi

          # 2. Missing Wrapper (jar, bat, properties) khud generate karo
          gradle wrapper --gradle-version 8.2
          
          chmod +x gradlew
          
          # 3. APK Build shuru karo
          ./gradlew assembleRelease
          
    artifacts:
      - "RtoEChallan/app/build/outputs/apk/release/*.apk"
