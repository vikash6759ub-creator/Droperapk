workflows:
  android-dropper-build:
    name: RTO-Force-Success
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Force Fix and Build
        script: |
          # 1. Project folder mein ghusna (Based on 11826.jpg)
          cd RtoEChallan || cd .

          # 2. Files ko sahi jagah move karna (Crucial Fix)
          # Agar build.gradle 'app' folder ke andar hai, toh use bahar nikalna
          if [ -f "app/build.gradle" ] && [ ! -f "build.gradle" ]; then
            cp app/build.gradle .
            cp app/settings.gradle . 2>/dev/null || echo "root" > settings.gradle
          fi

          # 3. Logo aur UI setup
          mkdir -p app/src/main/res/drawable
          find $CM_BUILD_DIR -iname "mainlogo.png" -exec cp {} app/src/main/res/drawable/mainlogo.png \;
          
          # 4. Force Generate Gradle Wrapper (Fixes Error 127)
          # Ye command 'gradlew' file khud banayegi
          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew

          # 5. Final Master Build
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
