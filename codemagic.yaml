workflows:
  android-dropper-build:
    name: Dropper Multi-Build (Automatic Force)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Automatic Repair and Build
        script: |
          cd RtoEChallan
          
          # 1. Purani sab kachra files delete
          rm -f build.gradle settings.gradle gradle.properties
          
          # 2. Fresh Properties
          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # 3. Settings setup
          echo "include ':app'" > settings.gradle

          # 4. Root build.gradle setup
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.0.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.0'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 5. Missing Image Error Fix (Layout file se error wali line delete karo)
          # Ye command activity_main.xml se us logo ko hata degi jo build rok raha hai
          sed -i '' '/google_play_text_logo/d' app/src/main/res/layout/activity_main.xml || true

          # 6. Auto-Signing Key (Google Info)
          keytool -genkey -v -keystore auto.keystore -alias auto_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass pass123 -keypass pass123 -dname "CN=Google Play, O=Android, C=US"

          # 7. Wrapper aur Final Build
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/auto.keystore \
            -Pandroid.injected.signing.store.password=pass123 \
            -Pandroid.injected.signing.key.alias=auto_alias \
            -Pandroid.injected.signing.key.password=pass123 \
            --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/**/*.apk"
