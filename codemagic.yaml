workflows:
  android-dropper-build:
    name: RTO-App-Folder-Success
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Build APK from App Folder
        script: |
          # 1. Project root mein jao
          cd RtoEChallan || cd .

          # 2. Logo inject karo (drawable folder mein)
          mkdir -p app/src/main/res/drawable
          find $CM_BUILD_DIR -iname "mainlogo.png" -exec cp {} app/src/main/res/drawable/mainlogo.png \;

          # 3. Gradle Wrapper refresh (Error 127 fix karne ke liye)
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

          # 4. Final Build - Ab ye seedha app folder ko uthayega
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
