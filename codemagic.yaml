# Codemagic Automation - Auto-Fix Gradle
workflows:
  android-dropper-build:
    name: Dropper APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      java: 17

    scripts:
      - name: Build Android Release APK
        script: |
          cd RtoEChallan
          
          # Agar gradlew nahi hai toh naya generate karo
          if [ ! -f "gradlew" ]; then
            echo "Gradlew missing, generating new one..."
            gradle wrapper
          fi
          
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - "RtoEChallan/app/build/outputs/apk/release/*.apk"
