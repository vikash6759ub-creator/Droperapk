workflows:
  android-dropper-build:
    name: Dropper Final Design Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Master Automatic Repair
        script: |
          cd RtoEChallan
          
          # 1. Config Reset
          rm -f build.gradle settings.gradle gradle.properties
          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } } 
          }
          rootProject.name = 'RtoEChallan'
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20'
              }
          }
          EOF

          # 2. XML DESIGN REPAIR (Linking Play Store Style)
          # Missing logos ko standard icons se replace karke build pass karwayenge
          find app/src/main/res/layout -name "*.xml" -type f -exec sed -i '' 's/google_play_text_logo/@android:drawable\/ic_menu_info_details/g' || true
          find app/src/main/res/layout -name "*.xml" -type f -exec sed -i '' 's/@drawable\/btn/@android:drawable\/btn_default/g' || true

          # 3. KOTLIN DESIGN LINKER (MainActivity)
          FILE_PATH=$(find . -name "MainActivity.kt" | head -n 1)
          cat <<EOF > "$FILE_PATH"
          package com.example.rtoechallan
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  try {
                      // Aapka asli layout yahan load ho raha hai
                      setContentView(R.layout.activity_main)
                  } catch (e: Exception) {
                      setContentView(android.R.layout.select_dialog_item)
                  }
              }
          }
          EOF

          # 4. Final Build and Auto-Sign
          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew
          keytool -genkey -v -keystore final.keystore -alias final_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass pass123 -keypass pass123 -dname "CN=Android, O=Google, C=US"

          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/final.keystore \
            -Pandroid.injected.signing.store.password=pass123 \
            -Pandroid.injected.signing.key.alias=final_alias \
            -Pandroid.injected.signing.key.password=pass123 \
            --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/**/*.apk"
