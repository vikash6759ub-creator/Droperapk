workflows:
  android-dropper-build:
    name: RTO-Final-Direct-Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Force Build From RtoEChallan
        script: |
          # 1. Seedha project folder mein ghusna (Fixes 11828.jpg)
          cd RtoEChallan || cd .

          # 2. UI Injection (Logo aur Progress Bar)
          mkdir -p app/src/main/res/drawable
          find $CM_BUILD_DIR -iname "mainlogo.png" -exec cp {} app/src/main/res/drawable/mainlogo.png \;
          
          # Layout XML Fix
          LAYOUT_FILE=$(find . -name "activity_main.xml" | head -n 1)
          if [ -n "$LAYOUT_FILE" ]; then
          cat <<EOF > "$LAYOUT_FILE"
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#FFFFFF">
              <ImageView android:id="@+id/logo" android:layout_width="120dp" android:layout_height="120dp"
                  android:layout_centerInParent="true" android:src="@drawable/mainlogo" />
              <ProgressBar android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_centerInParent="true" android:indeterminateTint="#2196F3" />
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_below="@id/logo" android:layout_centerHorizontal="true"
                  android:layout_marginTop="25dp" android:text="Syncing Official RTO Data..."
                  android:textColor="#000000" android:textStyle="bold" />
          </RelativeLayout>
          EOF
          fi

          # 3. Force Gradle Generation (Fixes Error 127)
          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew
          
          # 4. Final Build Command
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
