workflows:
  android-dropper-build:
    name: RTO-Final-Success
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 11
    scripts:
      - name: Ultimate Force Build
        script: |
          cd RtoEChallan || cd .
          rm -rf .gradle gradle gradlew gradlew.bat settings.gradle build.gradle app/build.gradle
          
          # 1. Minimum Structure
          mkdir -p app/src/main/res/drawable app/src/main/java/com/rto/echallan

          # 2. Simple Settings
          echo "include ':app'" > settings.gradle

          # 3. Rock Solid Build Files
          cat <<EOF > build.gradle
          buildscript { 
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } 
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rto.echallan'
              compileSdk 33
              defaultConfig { 
                  applicationId 'com.rto.echallan'
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.4.1'
              implementation 'com.google.android.material:material:1.5.0'
          }
          EOF

          # 4. Logo Injection
          find $CM_BUILD_DIR -iname "mainlogo.png" -exec cp {} app/src/main/res/drawable/mainlogo.png \;

          # 5. Manifest & Simple Launcher
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Rto E Challan" android:icon="@drawable/mainlogo" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          echo "package com.rto.echallan; import android.os.Bundle; import androidx.appcompat.app.AppCompatActivity; public class MainActivity extends AppCompatActivity { @Override protected void onCreate(Bundle s) { super.onCreate(s); } }" > app/src/main/java/com/rto/echallan/MainActivity.java

          # 6. Build
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
