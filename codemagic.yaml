workflows:
  android-dropper-build:
    name: RTO-Final-Green-Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Force Build APK
        script: |
          cd RtoEChallan || cd .
          rm -rf .gradle gradle gradlew gradlew.bat settings.gradle build.gradle app/build.gradle
          
          # 1. Simple Settings
          cat <<EOF > settings.gradle
          include ':app'
          EOF

          # 2. Basic Project Build
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 3. Lightweight App Build (Bypassing conflicts)
          mkdir -p app
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rto.echallan'
              compileSdk 33
              defaultConfig {
                  applicationId "com.rto.echallan"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.8.0'
          }
          EOF

          # 4. Generate Wrapper & Build (Using 7.5 for stability)
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
