# Codemagic Automation - Auto-Generation Version
workflows:
  android-dropper-build:
    name: Dropper APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      java: 17

    scripts:
      - name: Generate Wrapper and Build
        script: |
          # 1. Folder mein jao
          cd RtoEChallan
          
          # 2. Ye command saari missing files (.jar, .properties, .bat) khud bana degi
          gradle wrapper --gradle-version 8.2
          
          # 3. Permissions set karo
          chmod +x gradlew
          
          # 4. APK build karo
          ./gradlew assembleRelease

    artifacts:
      - "RtoEChallan/app/build/outputs/apk/release/*.apk"
