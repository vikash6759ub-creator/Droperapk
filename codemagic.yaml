workflows:
  android-dropper-build:
    name: RTO Final Branded Success
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Inject Logo and Progress Bar
        script: |
          # 1. Project Root Locator (Fixes 11804.jpg)
          SETTINGS_FILE=$(find . -name "settings.gradle" | head -n 1)
          ROOT_DIR=$(dirname "$SETTINGS_FILE")
          cd "$ROOT_DIR"

          # 2. Logo Injection (mainlogo.png)
          mkdir -p app/src/main/res/drawable
          find ../ -iname "mainlogo.png" -exec cp {} app/src/main/res/drawable/mainlogo.png \;
          
          # Drawer Header Update
          HEADER_FILE=$(find . -name "nav_header_main.xml" | head -n 1)
          if [ -n "$HEADER_FILE" ]; then
            sed -i '' 's/android:src=".*"/android:src="@drawable\/mainlogo"/g' "$HEADER_FILE"
          fi

          # 3. Layout Update (Adding Round Progress Bar)
          LAYOUT_FILE=$(find . -name "activity_main.xml" | head -n 1)
          cat <<EOF > "$LAYOUT_FILE"
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#FFFFFF">
              <ImageView
                  android:layout_width="150dp"
                  android:layout_height="150dp"
                  android:layout_centerInParent="true"
                  android:src="@drawable/mainlogo" />
              <ProgressBar
                  android:id="@+id/loadingBar"
                  style="?android:attr/progressBarStyleLarge"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_centerInParent="true"
                  android:indeterminateTint="#2196F3" />
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/loadingBar"
                  android:layout_centerHorizontal="true"
                  android:layout_marginTop="20dp"
                  android:text="Syncing RTO Data... Please Wait"
                  android:textColor="#000000"
                  android:textStyle="bold" />
          </RelativeLayout>
          EOF

          # 4. Final Build
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
