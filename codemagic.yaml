# Codemagic Automation for Droperapk
workflows:
  android-dropper-build:
    name: Dropper APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      java: 17
      # android_sdk ko yahan se hata diya hai kyunki ye default set hota hai

    scripts:
      - name: Build Android Release APK
        script: |
          # Folder ke andar jao
          cd RtoEChallan
          
          # Gradle permissions
          chmod +x gradlew
          
          # Build APK
          ./gradlew assembleRelease

    artifacts:
      - RtoEChallan/app/build/outputs/apk/release/*.apk

    publishing:
      scripts:
        - name: Done
          script: echo "Build Complete!"
