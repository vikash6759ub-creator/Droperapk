workflows:
  android-dropper-build:
    name: Dropper Final PlayStore Success
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Master Automatic Repair
        script: |
          # 1. Root Directory Setup
          cd RtoEChallan || exit 1
          
          # 2. Complete Config Reset (Fixing 11782.jpg error)
          rm -rf build.gradle settings.gradle gradle.properties
          
          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat <<EOF > settings.gradle
          pluginManagement { 
              repositories { google(); mavenCentral(); gradlePluginPortal() } 
          }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } } 
          }
          rootProject.name = 'RtoEChallan'
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 3. LOGO CONNECTION (Connecting your uploaded logo)
          mkdir -p app/src/main/res/drawable
          # Agar aapne logo upload kiya hai toh ye use link karega, warna default banayega
          if [ ! -f "app/src/main/res/drawable/google_play_text_logo.png" ]; then
            cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/drawable/google_play_text_logo.png || true
          fi

          # 4. XML FIX (Cleaning 11771/11778 Resource Errors)
          find app/src/main/res/layout -name "*.xml" -type f -exec sed -i '' 's/@drawable\/btn/@android:drawable\/btn_default/g' {} +

          # 5. MAIN ACTIVITY (Linking Real Page)
          FILE_PATH=$(find . -name "MainActivity.kt" | head -n 1)
          cat <<EOF > "$FILE_PATH"
          package com.example.rtoechallan
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  try {
                      setContentView(R.layout.activity_main)
                  } catch (e: Exception) {
                      setContentView(android.R.layout.select_dialog_item)
                  }
              }
          }
          EOF

          # 6. GRADLE WRAPPER & BUILD FIX
          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew
          
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/final.keystore \
            -Pandroid.injected.signing.store.password=pass123 \
            -Pandroid.injected.signing.key.alias=final_alias \
            -Pandroid.injected.signing.key.password=pass123 \
            --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/**/*.apk"
