workflows:
  android-dropper-build:
    name: RTO-Bypass-Conflict-Final
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Force Everything
        script: |
          cd RtoEChallan || cd .
          rm -rf .gradle gradle gradlew gradlew.bat settings.gradle build.gradle app/build.gradle
          
          # 1. Force Settings
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() } 
          }
          include ':app'
          EOF

          # 2. Force Project Build
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1'; classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.10' }
          }
          EOF

          # 3. Force App Build with Resolution Strategy (Fixes 11836.jpg)
          mkdir -p app
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.rto.echallan'
              compileSdk 33
              defaultConfig { applicationId "com.rto.echallan"; minSdk 21; targetSdk 33; versionCode 1; versionName "1.0" }
              buildTypes { release { minifyEnabled false } }
              configurations.all {
                  resolutionStrategy {
                      force 'androidx.appcompat:appcompat:1.6.1'
                      force 'com.google.android.material:material:1.9.0'
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

          # 4. Final Build
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
